<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Auth Container -->
    <div id="authContainer" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600">
        <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
            <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Chat App</h1>

            <!-- Login Form -->
            <div id="loginForm" class="space-y-4">
                <h2 class="text-xl font-semibold text-gray-700 mb-6">Prihlásenie</h2>
                <input 
                    type="email" 
                    id="loginEmail" 
                    placeholder="Email" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                <input 
                    type="password" 
                    id="loginPassword" 
                    placeholder="Heslo" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                <button 
                    onclick="handleLogin()" 
                    class="w-full bg-blue-500 text-white py-2 rounded-lg font-semibold hover:bg-blue-600 transition"
                >
                    Prihlásiť sa
                </button>
                <div style="margin-top:8px; display:flex; gap:8px; justify-content:center;">
                    <button type="button" onclick="fillTestUser('user1@test.sk','testuser1')" style="padding:6px 10px; border-radius:6px; border:1px solid #cbd5e1; background:#f8fafc; cursor:pointer">Test1</button>
                    <button type="button" onclick="fillTestUser('user2@test.sk','testuser2')" style="padding:6px 10px; border-radius:6px; border:1px solid #cbd5e1; background:#f8fafc; cursor:pointer">Test2</button>
                    <button type="button" onclick="fillTestUser('user3@test.sk','testuser3')" style="padding:6px 10px; border-radius:6px; border:1px solid #cbd5e1; background:#f8fafc; cursor:pointer">Test3</button>
                </div>
                <p class="text-center text-gray-600">
                    Nemáš účet? 
                    <button onclick="switchToRegister()" class="text-blue-500 font-semibold hover:underline">
                        Registrovať sa
                    </button>
                </p>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="space-y-4 hidden">
                <h2 class="text-xl font-semibold text-gray-700 mb-6">Registrácia</h2>
                <input 
                    type="email" 
                    id="registerEmail" 
                    placeholder="Email" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
                <input 
                    type="text" 
                    id="registerDisplayName" 
                    placeholder="Prezývka" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
                <input 
                    type="password" 
                    id="registerPassword" 
                    placeholder="Heslo" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
                <button 
                    onclick="handleRegister()" 
                    class="w-full bg-purple-500 text-white py-2 rounded-lg font-semibold hover:bg-purple-600 transition"
                >
                    Registrovať sa
                </button>
                <p class="text-center text-gray-600">
                    Máš účet? 
                    <button onclick="switchToLogin()" class="text-purple-500 font-semibold hover:underline">
                        Prihlásiť sa
                    </button>
                </p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="mt-4 p-3 bg-red-100 text-red-700 rounded-lg hidden"></div>
        </div>
    </div>

    <!-- Chat Container -->
    <div id="chatContainer" class="hidden min-h-screen bg-gray-100">
        <div class="max-w-2xl mx-auto h-screen flex flex-col">
            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6 shadow-lg">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-bold">Chat</h1>
                        <p id="userDisplay" class="text-sm opacity-90"></p>
                    </div>
                    <button 
                        onclick="handleLogout()" 
                        class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-semibold transition"
                    >
                        Odhlásenie
                    </button>
                </div>
            </div>

            <!-- Rooms + Messages Layout -->
            <div style="display:flex; gap:12px; padding:12px; flex:1;">
                <aside id="roomsPane" style="width:260px; background:#ffffff; border-radius:8px; padding:12px; box-shadow:0 6px 18px rgba(0,0,0,0.06);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <strong>Miestnosti</strong>
                        <button onclick="refreshRooms()" style="border:0;background:transparent;cursor:pointer;">⟳</button>
                    </div>
                    <div style="margin-bottom:8px;">
                        <input id="newRoomName" placeholder="Nová miestnosť" style="width:100%; padding:8px; border:1px solid #e5e7eb; border-radius:6px;">
                        <div style="margin-top:8px;"><button class="" onclick="createRoom()" style="padding:8px 10px; background:#3b82f6;color:#fff;border-radius:6px;border:0;cursor:pointer;width:100%">Vytvoriť</button></div>
                    </div>
                    <div id="roomsList" style="display:flex; flex-direction:column; gap:6px; max-height:60vh; overflow:auto;"></div>
                </aside>

                <section style="flex:1; display:flex; flex-direction:column; border-radius:8px; overflow:hidden;">
                    <div id="messagesContainer" style="flex:1; overflow-y:auto; padding:12px; background:#f9fafb; display:flex; flex-direction:column; gap:8px;"></div>

                    <div style="background:#fff; border-top:1px solid #e5e7eb; padding:10px;">
                        <div style="display:flex; gap:8px;">
                            <input id="messageInput" type="text" placeholder="Napíš správu..." style="flex:1;padding:10px;border:1px solid #e5e7eb;border-radius:6px;" onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()" style="padding:10px 14px;background:#3b82f6;color:#fff;border-radius:6px;border:0;cursor:pointer">Odoslať</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;

        // Quick-fill helper for test users
        function fillTestUser(email, password) {
            const emailInput = document.getElementById('loginEmail');
            const passInput = document.getElementById('loginPassword');
            if (emailInput) emailInput.value = email;
            if (passInput) passInput.value = password;
            // focus password for convenience
            if (passInput) passInput.focus();
        }

        function getDisplayName(user) {
            return user?.display_name || user?.displayName || user?.email || 'Používateľ';
        }

        // Switch between login and register forms
        function switchToRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            clearError();
        }

        function switchToLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            clearError();
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 5000);
        }

        function clearError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // Handle registration
        async function handleRegister() {
            const email = document.getElementById('registerEmail').value;
            const displayName = document.getElementById('registerDisplayName').value;
            const password = document.getElementById('registerPassword').value;

            if (!email || !displayName || !password) {
                showError('Vyplň všetky polia');
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, displayName, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.message || 'Chyba registrácie');
                    return;
                }

                currentUser = data.data.user;
                localStorage.setItem('user', JSON.stringify(currentUser));
                showChat();
            } catch (error) {
                showError('Chyba pri registrácii: ' + error.message);
            }
        }

        // Handle login
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showError('Vyplň email a heslo');
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.message || 'Nesprávne prihlasovacie údaje');
                    return;
                }

                currentUser = data.data.user;
                localStorage.setItem('user', JSON.stringify(currentUser));
                showChat();
            } catch (error) {
                showError('Chyba pri prihlasovaní: ' + error.message);
            }
        }

        // Show chat interface
        function showChat() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('chatContainer').classList.remove('hidden');
            document.getElementById('userDisplay').textContent = `Prihlásený ako: ${getDisplayName(currentUser)}`;
            
            // Initialize socket connection and load rooms
            initializeSocket();
            refreshRooms();
        }

        // Initialize Socket.IO
        let currentRoomId = null;
        function initializeSocket() {
            socket = io();

            socket.on('connect', () => {
                console.log('Pripojené k serveru');
            });

            // prijmi nové správy od ostatných
            socket.on('message:new', (data) => {
                if (data?.roomId === currentRoomId) {
                    displayMessage(data.body || data, 'other');
                }
            });

            socket.on('disconnect', () => {
                console.log('Odpojené od serveru');
            });
        }

        // Send message via socket
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;
            if (!currentRoomId) { showError('Vyber miestnosť'); return; }

            // optimistic UI
            displayMessage(message, 'user');
            input.value = '';

            // send via socket
            if (socket && socket.connected) {
                socket.emit('message:send', { roomId: currentRoomId, body: message });
            } else {
                showError('Nie si pripojený');
            }
        }

        // Display message in chat
        function displayMessage(message, sender) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.style.display = 'flex';
            messageDiv.style.justifyContent = sender === 'user' ? 'flex-end' : 'flex-start';

            const bubble = document.createElement('div');
            bubble.style.maxWidth = '70%';
            bubble.style.borderRadius = '12px';
            bubble.style.padding = '8px 10px';
            bubble.style.lineHeight = '1.3';
            if (sender === 'user') {
                bubble.style.background = '#3b82f6';
                bubble.style.color = '#fff';
            } else {
                bubble.style.background = '#e5e7eb';
                bubble.style.color = '#111827';
            }
            bubble.textContent = typeof message === 'string' ? message : (message.body || JSON.stringify(message));

            messageDiv.appendChild(bubble);
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Rooms CRUD frontend helpers
        async function refreshRooms() {
            try {
                const res = await fetch('/api/v1/rooms', { credentials: 'include' });
                if (!res.ok) throw new Error('Failed to load rooms');
                const body = await res.json();
                const rooms = body.data || body;
                renderRooms(rooms || []);
            } catch (err) {
                console.error(err);
                showError('Chyba načítania miestností');
            }
        }

        function renderRooms(rooms) {
            const list = document.getElementById('roomsList');
            list.innerHTML = '';
            rooms.forEach(r => {
                const b = document.createElement('button');
                b.textContent = r.name || `room:${r.id}`;
                b.style.padding = '8px';
                b.style.textAlign = 'left';
                b.style.border = '0';
                b.style.background = 'transparent';
                b.style.cursor = 'pointer';
                b.onclick = () => selectRoom(r.id);
                list.appendChild(b);
            });
        }

        async function createRoom() {
            const name = document.getElementById('newRoomName').value.trim();
            if (!name) { showError('Zadaj názov'); return; }
            try {
                const res = await fetch('/api/v1/rooms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, type: 'group' }),
                    credentials: 'include'
                });
                if (!res.ok) throw new Error('Create failed');
                document.getElementById('newRoomName').value = '';
                refreshRooms();
            } catch (err) {
                console.error(err);
                showError('Nepodarilo sa vytvoriť miestnosť');
            }
        }

        async function selectRoom(roomId) {
            currentRoomId = roomId;
            if (socket && socket.connected) socket.emit('join_room', roomId);
            await loadRoomMessages(roomId);
        }

        async function loadRoomMessages(roomId) {
            try {
                const res = await fetch(`/api/v1/rooms/${roomId}/messages`, { credentials: 'include' });
                if (!res.ok) throw new Error('Failed to load messages');
                const body = await res.json();
                const msgs = body.data || body;
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                (msgs || []).forEach(m => displayMessage(m.body || m, m.sender_id === currentUser?.id ? 'user' : 'other'));
            } catch (err) {
                console.error(err);
                showError('Chyba načítania správ');
            }
        }

        // Logout
        function handleLogout() {
            fetch('/api/v1/auth/logout', {
                method: 'POST',
                credentials: 'include'
            }).catch(err => console.error('Logout error:', err));
            
            currentUser = null;
            if (socket) socket.disconnect();
            
            document.getElementById('chatContainer').classList.add('hidden');
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            localStorage.removeItem('user');
            switchToLogin();
        }

        // Check if user is already logged in
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    showChat();
                } catch (e) {
                    localStorage.removeItem('user');
                }
            }

            fetch('/api/v1/users/profile', {
                credentials: 'include'
            })
            .then(res => res.ok ? res.json() : null)
            .then(data => {
                const user = data?.data?.user || data?.user || null;
                if (user) {
                    currentUser = user;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    if (document.getElementById('chatContainer').classList.contains('hidden')) {
                        showChat();
                    } else {
                        document.getElementById('userDisplay').textContent = `Prihlásený ako: ${getDisplayName(currentUser)}`;
                    }
                }
            })
            .catch(err => console.error('Auth check error:', err));
        });
    </script>
</body>
</html>
